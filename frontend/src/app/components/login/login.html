<div class="container login-box">
  <h2>{{ isSignup ? 'Sign Up' : 'Login' }}</h2>

  <label *ngIf="isSignup">Name</label>
  <input *ngIf="isSignup" [(ngModel)]="name" placeholder="Enter name" />

  <label>Email</label>
  <input [(ngModel)]="email" placeholder="Enter email" />

  <label>Password</label>
  <input [(ngModel)]="password" type="password" placeholder="Enter password" />

  <button (click)="submit()">
    {{ isSignup ? 'Create Account' : 'Login' }}
  </button>

  <p class="error" *ngIf="error">{{ error }}</p>

  <p>
    <a href="#" (click)="isSignup = !isSignup; $event.preventDefault()">
      {{ isSignup ? 'Already have an account? Login' : 'New user? Sign up' }}
    </a>
  </p>
</div>
